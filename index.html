<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tutorials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .modal { animation: modalPop 0.3s ease forwards; }

        @keyframes modalPop {
            0%   { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>

    <script>
    // ================================================================
    //  EDIT YOUR PROXIES HERE
    //  Each proxy has a title and a list of steps.
    //  Each step has:
    //    text  — the instruction text
    //    link  — (optional) a URL that appears as a clickable "Link 1", "Link 2" etc.
    //             under that step. Leave "" if you don't need a link on that step.
    //    media — (optional) paste an image URL or YouTube link, or leave ""
    //
    //  To add a new proxy, copy one of the blocks below and paste it
    //  after the last one (before the closing ] ).
    //  To remove a proxy, delete its { ... } block.
    // ================================================================

    const PROXIES = [
        {
            title: "Ultra Proxy Activation",
            steps: [
                { text: "Open any browser on your school device.", link: "", media: "" },
                { text: "Go to your proxy URL — paste your real link here.", link: "https://example.com", media: "" },
                { text: "Paste the blocked site URL into the proxy bar.", link: "", media: "" },
                { text: "Click GO or Browse.", link: "", media: "" },
                { text: "You now have full access — enjoy your 'Math Tutorials'!", link: "", media: "" }
            ]
        },
        {
            title: "Quick Browser Proxy",
            steps: [
                { text: "Open Chrome or Edge settings.", link: "", media: "" },
                { text: "Search for 'proxy' in settings.", link: "", media: "" },
                { text: "Configure manual proxy with your school bypass details.", link: "", media: "" },
                { text: "Save and restart the browser.", link: "", media: "" },
                { text: "Test access to blocked resources.", link: "", media: "" }
            ]
        },
        {
            title: "Advanced Method",
            steps: [
                { text: "Use this entry as a template.", link: "", media: "" },
                { text: "Add your custom proxy instructions here.", link: "", media: "" },
                { text: "You can have as many steps as you need.", link: "", media: "" },
                { text: "Add a link to any step — it shows as 'Link 1', 'Link 2', etc.", link: "https://example.com", media: "" }
            ]
        }
    ]

    // ================================================================
    //  END OF CONFIG — do not edit below unless you know what you're doing
    // ================================================================
    </script>
</head>
<body class="bg-zinc-950 text-white" style="font-family:'Inter',sans-serif;">

    <!-- NAVBAR -->
    <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center gap-x-3">
            <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl font-bold">📐</div>
            <h1 class="text-3xl font-semibold tracking-tighter" style="font-family:'Space Grotesk',sans-serif;">Math Tutorials</h1>
            <span class="text-emerald-400 text-sm font-medium px-3 py-1 bg-emerald-500/10 rounded-3xl border border-emerald-500/30">PROXY ACTIVATION GUIDE</span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- HERO -->
        <div class="mb-12 text-center">
            <h2 class="text-5xl font-semibold tracking-tighter mb-3" style="font-family:'Space Grotesk',sans-serif;">
                Choose your proxy method
            </h2>
            <p class="text-zinc-400 max-w-md mx-auto">
                Click any button below to get step-by-step instructions on how to activate a web proxy for school.
            </p>
        </div>

        <!-- PROXY GRID -->
        <div id="proxy-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

        <!-- Empty state -->
        <div id="empty-state" class="hidden py-20 text-center">
            <div class="mx-auto w-24 h-24 bg-zinc-900 rounded-3xl flex items-center justify-center text-5xl mb-6">📭</div>
            <h3 class="text-2xl font-semibold mb-2">No proxies added yet</h3>
            <p class="text-zinc-400">Open index.html and add proxies to the PROXIES config at the top of the script.</p>
        </div>
    </div>

    <!-- VIEW INSTRUCTIONS MODAL -->
    <div onclick="if(event.target.id==='view-modal')closeModal()"
         id="view-modal"
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4">
        <div onclick="event.stopImmediatePropagation()"
             class="modal bg-zinc-900 rounded-3xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col">

            <div class="px-8 pt-6 pb-4 border-b border-zinc-700 flex items-center justify-between">
                <h2 id="modal-title" class="text-3xl font-semibold"></h2>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-4xl leading-none">×</button>
            </div>

            <div id="modal-body" class="flex-1 p-8 overflow-auto"></div>

            <div class="px-8 py-6 border-t border-zinc-700 flex justify-end">
                <button onclick="closeModal()"
                        class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm">Close</button>
            </div>
        </div>
    </div>

    <script>
        // ---- helpers ----

        function escapeHtml(s) {
            return s
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;")
        }

        function renderMedia(url) {
            if (!url || !url.trim()) return ""
            const u = url.trim()
            const yt = u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]+)/)
            if (yt) {
                return `<div class="rounded-2xl overflow-hidden mt-3" style="aspect-ratio:16/9">
                            <iframe src="https://www.youtube.com/embed/${yt[1]}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                        </div>`
            }
            if (/\.(mp4|webm|ogg)(\?|$)/i.test(u)) {
                return `<video src="${u}" controls class="w-full rounded-2xl max-h-64 mt-3"></video>`
            }
            return `<img src="${u}" class="max-h-64 w-full object-contain rounded-2xl bg-zinc-800 mt-3"
                         onerror="this.style.display='none'">`
        }

        // ---- grid ----

        function renderGrid() {
            const grid  = document.getElementById("proxy-grid")
            const empty = document.getElementById("empty-state")

            if (!PROXIES || PROXIES.length === 0) {
                empty.classList.remove("hidden")
                return
            }
            empty.classList.add("hidden")

            grid.innerHTML = PROXIES.map((proxy, i) => `
                <div class="card group bg-zinc-900 hover:bg-zinc-800 border border-zinc-700
                            hover:border-emerald-400/30 rounded-3xl p-6 flex flex-col h-full">
                    <div class="flex-1">
                        <h3 class="text-2xl font-semibold leading-tight mb-4">${escapeHtml(proxy.title)}</h3>
                        <p class="text-emerald-400 text-sm mb-8">
                            ${proxy.steps.length} instruction step${proxy.steps.length !== 1 ? "s" : ""} &bull; Click to view
                        </p>
                    </div>
                    <button onclick="openModal(${i})"
                            class="mt-auto w-full py-4 bg-white text-zinc-900 rounded-3xl font-semibold
                                   flex items-center justify-center gap-x-2
                                   hover:shadow-xl hover:shadow-emerald-400/20 hover:bg-emerald-400 hover:text-white">
                        VIEW INSTRUCTIONS <span class="text-xl">→</span>
                    </button>
                </div>`
            ).join("")
        }

        // ---- modal ----

        function openModal(index) {
            const proxy = PROXIES[index]
            if (!proxy) return

            document.getElementById("modal-title").textContent = proxy.title

            let linkCounter = 0
            document.getElementById("modal-body").innerHTML =
                `<ol class="list-decimal pl-5 space-y-6 text-lg">` +
                proxy.steps.map(step => {
                    const text  = typeof step === "string" ? step : (step.text  || "")
                    const link  = typeof step === "string" ? ""   : (step.link  || "")
                    const media = typeof step === "string" ? ""   : (step.media || "")
                    let linkHTML = ""
                    if (link.trim()) {
                        linkCounter++
                        linkHTML = `<a href="${escapeHtml(link.trim())}"
                                       target="_blank" rel="noopener noreferrer"
                                       class="inline-flex items-center gap-1 mt-2 px-4 py-1.5 text-sm font-medium
                                              bg-emerald-500/10 text-emerald-400 border border-emerald-500/30
                                              rounded-full hover:bg-emerald-500/20 transition-colors">
                                        🔗 Link ${linkCounter}
                                    </a>`
                    }
                    return `<li class="text-zinc-200">
                                <span>${escapeHtml(text)}</span>
                                ${linkHTML}
                                ${renderMedia(media)}
                            </li>`
                }).join("") +
                `</ol>`

            const modal = document.getElementById("view-modal")
            modal.classList.remove("hidden")
            modal.classList.add("flex")
        }

        function closeModal() {
            const modal = document.getElementById("view-modal")
            modal.classList.add("hidden")
            modal.classList.remove("flex")
        }

        // close on Escape key
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal() })

        // ---- init ----
        renderGrid()
    </script>
</body>
</html>
